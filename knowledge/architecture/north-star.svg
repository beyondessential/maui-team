<svg width="100%" viewBox="0 0 680 600" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>BES data architecture — north star</title>
<desc>Four-tier architecture: source systems (Tamanu production DB, tamanu-source-dbt, Non-Tamanu sources), dbt and orchestration (optional tamanu-dbt-deployment, bes-data-pipelines), analytics environment (Tamanu replica DB, data-warehouse RDS), and data consumers (Tamanu reports, Tupaia). Solid arrows show runtime data flows. Dashed arrows from tamanu-source-dbt and tamanu-dbt-deployment to production DB represent compiled SQL bundles deployed at release time.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- dbt + orchestration container -->
<rect x="238" y="42" width="207" height="234" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text font-size="12" fill="#5F5E5A" x="340" y="38" text-anchor="middle">dbt + orchestration</text>

<!-- analytics environment container -->
<rect x="22" y="330" width="636" height="80" rx="12" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
<text font-size="12" fill="#5F5E5A" x="34" y="326" text-anchor="start">analytics environment</text>

<!-- Tamanu production DB -->
<rect x="30" y="50" width="193" height="60" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="126" y="73" text-anchor="middle" dominant-baseline="central">Tamanu production DB</text>
<text font-size="12" fill="#185FA5" x="126" y="91" text-anchor="middle" dominant-baseline="central">per deployment · live data</text>

<!-- tamanu-source-dbt -->
<rect x="247" y="50" width="186" height="60" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="73" text-anchor="middle" dominant-baseline="central">tamanu-source-dbt</text>
<text font-size="12" fill="#534AB7" x="340" y="91" text-anchor="middle" dominant-baseline="central">standard dbt package</text>

<!-- Non-Tamanu sources -->
<rect x="452" y="50" width="188" height="60" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="546" y="73" text-anchor="middle" dominant-baseline="central">Non-Tamanu sources</text>
<text font-size="12" fill="#185FA5" x="546" y="91" text-anchor="middle" dominant-baseline="central">mSupply, SENAITE, weather</text>

<!-- tamanu-dbt-deployment -->
<rect x="247" y="140" width="186" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="154" text-anchor="middle" dominant-baseline="central">tamanu-dbt-deployment</text>
<text font-size="12" fill="#534AB7" x="340" y="171" text-anchor="middle" dominant-baseline="central">customised deployments only</text>

<!-- bes-data-pipelines -->
<rect x="247" y="204" width="186" height="60" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="340" y="227" text-anchor="middle" dominant-baseline="central">bes-data-pipelines</text>
<text font-size="12" fill="#534AB7" x="340" y="245" text-anchor="middle" dominant-baseline="central">Dagster orchestration</text>

<!-- Tamanu replica DB -->
<rect x="30" y="340" width="193" height="60" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="126" y="363" text-anchor="middle" dominant-baseline="central">Tamanu replica DB</text>
<text font-size="12" fill="#185FA5" x="126" y="381" text-anchor="middle" dominant-baseline="central">canonical dbt layers</text>

<!-- data-warehouse RDS -->
<rect x="452" y="340" width="188" height="60" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="546" y="363" text-anchor="middle" dominant-baseline="central">data-warehouse RDS</text>
<text font-size="12" fill="#185FA5" x="546" y="381" text-anchor="middle" dominant-baseline="central">non-Tamanu data</text>

<!-- Tamanu reports (consumer) -->
<rect x="30" y="460" width="200" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="130" y="483" text-anchor="middle" dominant-baseline="central">Tamanu reports</text>
<text font-size="12" fill="#0F6E56" x="130" y="501" text-anchor="middle" dominant-baseline="central">views in production DB</text>

<!-- Tupaia (consumer) -->
<rect x="260" y="460" width="360" height="60" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="440" y="483" text-anchor="middle" dominant-baseline="central">Tupaia</text>
<text font-size="12" fill="#0F6E56" x="440" y="501" text-anchor="middle" dominant-baseline="central">Data Tables · External DB Connections</text>

<!-- ARROWS -->

<!-- Tamanu production DB → Tamanu replica DB (pgro restore) -->
<path d="M127,110 L127,340" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="132" y="228">pgro restore</text>

<!-- Tamanu production DB → Tamanu reports (left margin route) -->
<path d="M30,80 L15,80 L15,490 L30,490" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Non-Tamanu sources → data-warehouse RDS -->
<path d="M546,110 L546,340" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- tamanu-source-dbt → Tamanu production DB (compiled bundle, dashed) -->
<path d="M247,80 L225,80" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- tamanu-dbt-deployment → Tamanu production DB (custom compiled bundle, dashed) -->
<path d="M247,162 L230,162 L230,95 L225,95" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

<!-- tamanu-source-dbt → tamanu-dbt-deployment -->
<path d="M340,110 L340,140" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- tamanu-dbt-deployment → bes-data-pipelines -->
<path d="M340,184 L340,204" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- bes-data-pipelines → Tamanu replica DB (L-bend, enters right side) -->
<path d="M247,234 L237,234 L237,370 L225,370" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- bes-data-pipelines → data-warehouse RDS (L-bend, enters left side) -->
<path d="M433,234 L443,234 L443,370 L450,370" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Tamanu replica DB → Tupaia (routes above Tamanu reports) -->
<path d="M127,400 L127,450 L400,450 L400,460" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- data-warehouse RDS → Tupaia (straight vertical) -->
<path d="M546,400 L546,460" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LEGEND -->
<line x1="30" y1="556" x2="58" y2="556" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="64" y="560" dominant-baseline="central">runtime data flow</text>
<line x1="230" y1="556" x2="258" y2="556" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text font-size="12" fill="#5F5E5A" x="264" y="560" dominant-baseline="central">build-time artefact (compiled bundle)</text>
</svg>
