name: Claude Code Review

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout PR branch
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Update .maui submodule
        if: github.event_name == 'pull_request'
        id: update-submodule
        run: |
          git submodule update --remote .maui
          if git diff --quiet HEAD -- .maui; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo ".maui is already up to date"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push submodule update
        if: github.event_name == 'pull_request' && steps.update-submodule.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .maui
          git commit -m "chore: update .maui submodule"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.sha')
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "sha=$PR_SHA" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve review reference file
        id: review
        run: |
          if [ -f "REVIEW.md" ]; then
            echo "path=REVIEW.md" >> $GITHUB_OUTPUT
          else
            echo "path=.maui/REVIEW.md" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          use_sticky_comment: true
          prompt: "/review"
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(gh pr *),Bash(gh api*),Bash(git diff*),Bash(git log*)"
            --append-system-prompt "Read ${{ steps.review.outputs.path }} and follow all instructions in it."
