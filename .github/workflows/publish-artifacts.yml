name: Publish Artifacts

# Reusable workflow — call from any tamanu-source-dbt or tamanu-dbt-* repo.
#
# Deployment name is derived from the calling repository name:
#   tamanu-source-dbt  → standard
#   tamanu-dbt-fiji    → fiji
#
# S3 layout:
#   standard:   M.m.x/<artifact>-vM.m.x-standard.<ext>   (canonical artifacts)
#               M.m.x/reporting-standard/                  (reports)
#   deployment: M.m.x/<deployment>/reporting-<deployment>/ (reports only)
#
# list-reports only runs for the standard repo on its latest release.

on:
  workflow_call:

jobs:
  # -------------------------------------------------------------------------
  # Derive the deployment name and check whether this is the highest-version
  # release for the calling repo. Both outputs are consumed by downstream jobs.
  # -------------------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      deployment: ${{ steps.derive.outputs.deployment }}
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - name: Derive deployment name from repository
        id: derive
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == "tamanu-source-dbt" ]]; then
            echo "deployment=standard" >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_NAME" == tamanu-dbt-* ]]; then
            echo "deployment=${REPO_NAME#tamanu-dbt-}" >> "$GITHUB_OUTPUT"
          else
            echo "deployment=standard" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if latest version release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THIS_TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          this_tag = os.environ['THIS_TAG']
          repo = os.environ['REPO']

          result = subprocess.run(
              ['gh', 'release', 'list', '--repo', repo,
               '--json', 'tagName,isPrerelease,isDraft', '--limit', '250'],
              capture_output=True, text=True, check=True,
          )
          releases = json.loads(result.stdout)
          tags = [
              r['tagName'] for r in releases
              if not r.get('isPrerelease') and not r.get('isDraft')
          ]

          def semver(tag):
              try:
                  return tuple(int(x) for x in tag.lstrip('v').split('.')[:3])
              except ValueError:
                  return (0, 0, 0)

          is_latest = not tags or semver(this_tag) >= max(semver(t) for t in tags)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write(f"is_latest={'true' if is_latest else 'false'}\n")
          PYEOF

  # -------------------------------------------------------------------------
  # Only runs for the standard (tamanu-source-dbt) repo on its latest release.
  # -------------------------------------------------------------------------
  list-reports:
    name: List Tamanu Reports
    needs: setup
    if: needs.setup.outputs.is_latest == 'true' && needs.setup.outputs.deployment == 'standard'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install boto3 pandas PyYAML

      - name: List Tamanu Reports
        run: python scripts/list_tamanu_reports.py

  # -------------------------------------------------------------------------
  # Runs for every release in every repo.
  #
  # Canonical artifacts (analytics-metadata, reporting-schema, reporting-docs):
  #   standard only:  M.m.x/<artifact>-vM.m.x-standard.<ext>
  #
  # Reports folder (all repos):
  #   standard:    M.m.x/reporting-standard/
  #   deployment:  M.m.x/<deployment>/reporting-<deployment>/
  # -------------------------------------------------------------------------
  publish-artifacts:
    name: Publish artifacts
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-2
          role-to-assume: arn:aws:iam::491618206332:role/gha-s3-tamanu-translations
          role-session-name: TamanuDbt-${{ needs.setup.outputs.deployment }}
          audience: sts.amazonaws.com

      - name: Publish to S3 and meta-server
        env:
          DEPLOYMENT: ${{ needs.setup.outputs.deployment }}
          META_CERT: ${{ secrets.META_CERT }}
          META_KEY: ${{ secrets.META_KEY }}
          META_URL: ${{ vars.META_URL }}
        run: |
          set -euxo pipefail
          VERSION=${GITHUB_REF#refs/tags/v}
          VX=${VERSION%.*}.x
          BUCKET=s3://bes-data-tamanu-translations

          # Standard artifacts sit directly in M.m.x/;
          # deployment artifacts go in the M.m.x/<deployment>/ subfolder.
          if [ "$DEPLOYMENT" = "standard" ]; then
            S3_DIR="$VX"
          else
            S3_DIR="$VX/$DEPLOYMENT"
          fi

          REPORTS_FOLDER="reporting-$DEPLOYMENT"

          # Canonical artifacts: standard only, uploaded to the top-level folder
          if [ "$DEPLOYMENT" = "standard" ]; then
            for artifact in analytics-metadata reporting-schema reporting-docs; do
              file=$(ls compiled/v$VERSION/$artifact-* 2>/dev/null | head -1)
              [ -z "$file" ] && continue
              filename=$(basename "$file")
              renamed="${filename//v$VERSION/v$VX}"
              aws s3 cp "$file" "$BUCKET/$S3_DIR/$renamed"
            done
          fi

          # Reports: all repos, uploaded to reporting-<deployment>/ subfolder
          for file in compiled/v$VERSION/*; do
            filename=$(basename "$file")
            case "$filename" in
              analytics-metadata-*|reporting-schema-*|reporting-docs-*) continue ;;
            esac
            renamed="${filename//v$VERSION/v$VX}"
            aws s3 cp "$file" "$BUCKET/$S3_DIR/$REPORTS_FOLDER/$renamed"
          done

          echo "$META_CERT" > meta.crt
          echo "$META_KEY" > meta.key

          BASE_URL="https://tamanu-translations.data.bes.au/$S3_DIR"

          # Register canonical artifacts with meta-server: standard only
          if [ "$DEPLOYMENT" = "standard" ]; then
            curl -v "$META_URL/artifacts/$S3_DIR/analytics-metadata/any" \
              --cert meta.crt --key meta.key \
              --data-binary "$BASE_URL/analytics-metadata-v$VX-$DEPLOYMENT.yml"

            curl -v "$META_URL/artifacts/$S3_DIR/reporting-schema/any" \
              --cert meta.crt --key meta.key \
              --data-binary "$BASE_URL/reporting-schema-v$VX-$DEPLOYMENT.sql"

            curl -v "$META_URL/artifacts/$S3_DIR/reporting-docs/any" \
              --cert meta.crt --key meta.key \
              --data-binary "$BASE_URL/reporting-docs-v$VX-$DEPLOYMENT.html"
          fi

          # Register reports folder with meta-server: all repos
          curl -v "$META_URL/artifacts/$S3_DIR/$REPORTS_FOLDER/any" \
            --cert meta.crt --key meta.key \
            --data-binary "$BASE_URL/$REPORTS_FOLDER/"
